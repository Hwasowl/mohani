# 프로덕션용 — Caddy로 HTTPS 자동, Spring 앱 포함.
# 사용: docker compose -f docker-compose.prod.yml up -d
# 환경변수(.env 파일):
#   MOHANI_DOMAIN=mohani.example.com
#   MOHANI_JWT_SECRET=<32+ bytes random>
#   POSTGRES_PASSWORD=<strong>

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mohani
      POSTGRES_USER: mohani
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mohani"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mohani
      SPRING_DATASOURCE_USERNAME: mohani
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      MOHANI_JWT_SECRET: ${MOHANI_JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      MOHANI_DOMAIN: ${MOHANI_DOMAIN}
    depends_on:
      - app

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

services:
  postgres:
    image: postgres:16-alpine
    container_name: mohani-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mohani
      POSTGRES_USER: mohani
      POSTGRES_PASSWORD: mohani
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mohani"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mohani-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:

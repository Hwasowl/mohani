spring:
  application:
    name: mohani-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mohani
    username: mohani
    # 로컬 default = 'mohani' (docker-compose.yml의 POSTGRES_PASSWORD와 일치).
    # prod(Render 등)는 SPRING_DATASOURCE_PASSWORD env로 자동 override — 별도 profile 분리 불필요.
    password: ${SPRING_DATASOURCE_PASSWORD:mohani}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  # Render/Heroku 등 PaaS는 PORT env로 포트를 주입한다 — fallback 8080 (로컬 dev)
  port: ${PORT:8080}

mohani:
  jwt:
    # 로컬 default = 32바이트 더미. prod는 MOHANI_JWT_SECRET env로 강제 override 필수.
    # JwtService가 length(>=32) + 약한 패턴('dev-secret', 'change-me' 등) 거부 가드 적용 —
    # prod env에 약한 값이 들어가면 부팅 실패하므로 약한 default가 prod로 새지 않음.
    secret: ${MOHANI_JWT_SECRET:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
    ttl-seconds: 2592000   # 30일

management:
  endpoints:
    web:
      exposure:
        # health만 노출. 익명 가입(/auth/anonymous)으로 누구나 JWT 받을 수 있어서
        # 인증 게이트로 metrics/info를 보호해도 의미 없음 → expose 자체에서 제외.
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.mohani: DEBUG

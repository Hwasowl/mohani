spring:
  application:
    name: mohani-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mohani
    username: mohani
    password: mohani
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  # Render/Heroku 등 PaaS는 PORT env로 포트를 주입한다 — fallback 8080 (로컬 dev)
  port: ${PORT:8080}

mohani:
  jwt:
    # 운영환경에서는 환경변수로 주입. dev 기본값 (256bit hex 가짜 시크릿)
    secret: ${MOHANI_JWT_SECRET:dev-secret-change-me-1234567890abcdef1234567890abcdef}
    ttl-seconds: 2592000   # 30일

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.mohani: DEBUG

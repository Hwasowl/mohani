spring:
  application:
    name: mohani-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mohani
    username: mohani
    # H3 (0.1.12): 모든 환경에서 환경변수 강제 — 미설정 시 부팅 실패.
    # MOHANI_JWT_SECRET 패턴과 동일. 로컬 dev는 IDE run config 또는 shell env로 'mohani' 주입.
    # Render는 SPRING_DATASOURCE_PASSWORD가 이미 강한 값으로 설정되어 있으므로 변경 없이 동작.
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  # Render/Heroku 등 PaaS는 PORT env로 포트를 주입한다 — fallback 8080 (로컬 dev)
  port: ${PORT:8080}

mohani:
  jwt:
    # 모든 환경에서 환경변수 강제 — 미설정 시 부팅 실패. dev라도 random secret 1회 생성해 주입.
    # JwtService가 추가로 length(>=32) + 약한 패턴(dev-secret 등) 거부 가드 적용.
    secret: ${MOHANI_JWT_SECRET}
    ttl-seconds: 2592000   # 30일

management:
  endpoints:
    web:
      exposure:
        # health만 노출. 익명 가입(/auth/anonymous)으로 누구나 JWT 받을 수 있어서
        # 인증 게이트로 metrics/info를 보호해도 의미 없음 → expose 자체에서 제외.
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.mohani: DEBUG

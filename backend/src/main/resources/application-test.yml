spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:mohani-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379

mohani:
  jwt:
    secret: test-jwt-secret-needs-32-bytes-min-1234567890abcdef
    ttl-seconds: 3600

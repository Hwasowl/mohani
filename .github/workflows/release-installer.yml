# release-* 태그 push 시 NSIS로 Mohani-Setup.exe 빌드 + GitHub Releases 업로드.
# 사용법:
#   git tag release-0.1.0
#   git push origin release-0.1.0
#
# 런처 자체는 npm의 mohani@latest를 부트스트랩하는 얇은 래퍼라
# 런처 로직 변경 시에만 새 release-* 태그를 찍으면 됨 (앱 로직 업데이트는 npm publish 쪽).
name: Build installer

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis

      - name: Build Mohani-Setup.exe
        working-directory: installer
        run: makensis mohani.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mohani-Setup
          path: installer/Mohani-Setup.exe

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Mohani-Setup.exe
          generate_release_notes: true
